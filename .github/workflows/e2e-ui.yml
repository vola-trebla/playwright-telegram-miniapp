name: E2E UI tests

on:
  push:
    branches: [main] # post-merge validation
  schedule:
    - cron: '0 3 * * *' # nightly — catches env drift / flakiness over time
  workflow_dispatch: # run on demand
# Deliberately NOT on pull_request: this is a test-framework repo, and e2e suites are heavy
# and prone to flake — gating every PR on them just blocks the author. They run post-merge,
# nightly, and on demand instead.

jobs:
  ui:
    name: Mini App UI (Chromium)
    runs-on: ubuntu-latest
    # Official Playwright image — browsers + OS deps preinstalled. Tag MUST match the
    # @playwright/test version in e2e/package.json (1.60.0), so it finds the bundled browsers.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    env:
      # Not secrets — throwaway test values. `test-bot-token` is a dummy: the backend boots in
      # test mode and validates initData against this very token, which the tests sign with, so
      # the loop closes with nothing real involved. For a real environment, drop a real token in
      # GitHub Secrets and swap to ${{ secrets.TEST_BOT_TOKEN }}.
      MARKET_URL: http://localhost:3100
      TEST_BOT_TOKEN: test-bot-token
      HUSKY: 0 # skip git hooks install on CI
    steps:
      - uses: actions/checkout@v4

      - name: Install backend deps (root workspaces)
        run: npm ci

      - name: Install e2e deps
        run: npm ci
        working-directory: e2e

      # No `playwright install` — the browsers already live in the image.
      - name: Run Mini App UI tests
        run: npm run test:web
        working-directory: e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ui
          path: e2e/playwright-report/
          retention-days: 7
