name: API tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  api:
    name: API + WebSocket
    runs-on: ubuntu-latest
    env:
      # Not secrets — throwaway test values. `test-bot-token` is a dummy: the backend boots in
      # test mode and validates initData against this very token, which the tests sign with, so
      # the loop closes with nothing real involved. For a real environment, drop a real token in
      # GitHub Secrets and swap to ${{ secrets.TEST_BOT_TOKEN }}.
      MARKET_URL: http://localhost:3100
      TEST_BOT_TOKEN: test-bot-token
      HUSKY: 0 # skip git hooks install on CI
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            e2e/package-lock.json

      - name: Install backend deps (root workspaces)
        run: npm ci

      - name: Install e2e deps
        run: npm ci
        working-directory: e2e

      # No browser needed — the `api` project drives Playwright's request context.
      # Playwright boots the backend itself (webServer in playwright.config.ts).
      - name: Run API + WS tests
        run: npm run test:api
        working-directory: e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: e2e/playwright-report/
          retention-days: 7
