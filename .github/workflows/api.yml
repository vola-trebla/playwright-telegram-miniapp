name: API tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  api:
    name: API + WebSocket
    runs-on: ubuntu-latest
    env:
      # On CI the test config has no fallbacks — provide them explicitly.
      MARKET_URL: http://localhost:3100
      TEST_BOT_TOKEN: test-bot-token
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            e2e/package-lock.json

      - name: Install backend deps (root workspaces)
        run: npm ci

      - name: Install e2e deps
        run: npm ci
        working-directory: e2e

      # No browser needed — the `api` project drives Playwright's request context.
      # Playwright boots the backend itself (webServer in playwright.config.ts).
      - name: Run API + WS tests
        run: npm run test:api
        working-directory: e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: e2e/playwright-report/
          retention-days: 7
