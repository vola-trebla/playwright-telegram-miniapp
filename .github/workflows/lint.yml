name: Lint & typecheck

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: ESLint + tsc
    runs-on: ubuntu-latest
    env:
      HUSKY: 0 # skip git hooks install on CI
      # Not secrets — throwaway test values (config.ts just needs them to import on CI).
      # `test-bot-token` is a dummy; nothing real is leaked. Real env → use GitHub Secrets.
      MARKET_URL: http://localhost:3100
      TEST_BOT_TOKEN: test-bot-token
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      # The gate only needs the e2e toolchain (ESLint, typescript-eslint, tsc) — no backend,
      # no browser.
      - name: Install e2e deps
        run: npm ci
        working-directory: e2e

      - name: Lint + typecheck
        run: npm run check
        working-directory: e2e
